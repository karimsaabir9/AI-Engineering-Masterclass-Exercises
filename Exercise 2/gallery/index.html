
<!DOCTYPE html>
<html>
<head>
<title>Image Gallery</title>
<style>
body { font-family: Arial; background:#111; color:white; }
h1 { text-align:center; }
.grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:15px; padding:20px; }
.card { background:#222; padding:10px; border-radius:10px; }
img { width:100%; border-radius:10px; }
</style>
</head>

<body>

<h1>anime style character</h1>

<div class="grid">

      <div class="card">
        <img src="../images/gpt-image-1_1024x1024_1781339954247.png" />
        <div class="info">
          <p><b>Size:</b> 1024x1024</p>
        </div>
      </div>
    
      <div class="card">
        <img src="../images/gpt-image-1_1536x1024_1781339974575.png" />
        <div class="info">
          <p><b>Size:</b> 1536x1024</p>
        </div>
      </div>
    
      <div class="card">
        <img src="../images/gpt-image-1_1024x1536_1781340026137.png" />
        <div class="info">
          <p><b>Size:</b> 1024x1536</p>
        </div>
      </div>
    
</div>

</body>
</html>
